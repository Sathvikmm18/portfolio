<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sathvik M M | Intro</title>
    <meta
      name="description"
      content="Portfolio intro — Sathvik M M, CyberSecurity and DevSecOps engineer."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="intro-page">
    <div class="intro-shell" id="intro">
      <div class="intro-vignette" aria-hidden="true"></div>
      <div class="intro-speed-lines" aria-hidden="true"></div>

      <div class="intro-copy">
        <p class="intro-eyebrow">CyberSecurity &amp; DevSecOps</p>
        <h1 class="intro-name">Sathvik M M</h1>
        <p class="intro-role">Security Engineer · Penetration Testing · SIEM · Cloud Security</p>
      </div>

      <div class="intro-badge" aria-hidden="true">
        <span class="m5-tag">2025 BMW M5</span>
        <span class="m5-model">G90 · Frozen Deep Grey</span>
      </div>

      <div class="intro-road" aria-hidden="true">
        <div class="intro-road-grid"></div>
        <div class="intro-road-glow"></div>
        <div class="m5-track">
          <div class="m5-car-scene">
            <div class="m5-car-shadow"></div>
            <div class="m5-car-speed-wake"></div>
            <img
              class="m5-car-image"
              src=""
              alt=""
              width="1200"
              height="675"
              decoding="async"
            />
            <div class="m5-car-shine"></div>
            <div class="m5-car-reflection" aria-hidden="true"></div>
          </div>
        </div>
      </div>

      <div class="intro-progress" aria-label="Loading portfolio">
        <div class="intro-progress-bar" id="introProgress"></div>
        <span class="intro-progress-label">Entering portfolio…</span>
      </div>
    </div>

    <script src="intro.js"></script>
  </body>
</html>
